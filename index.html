  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fafafa;
      color: #0a0a0a;
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "cv02","cv03","cv04","cv11";
      letter-spacing: -0.005em;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }

    .display-font { font-family: 'Fraunces', 'Inter', serif; font-feature-settings: "ss01"; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 0.25; transform: scale(0.7); }
      50%       { opacity: 1;   transform: scale(1); }
    }
    @keyframes urgentPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }
    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to   { opacity: 1; max-height: 800px; }
    }
    /* Kanban task state transitions */
    @keyframes taskEnterFromTodo {
      from { opacity: 0; transform: translateX(-26px) scale(0.97); filter: blur(3px); }
      to   { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
    }
    @keyframes taskEnterFromDone {
      from { opacity: 0; transform: translateX(26px) scale(0.97); filter: blur(3px); }
      to   { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
    }
    .fade-up  { animation: fadeUp  0.35s ease-out both; }
    .fade-in  { animation: fadeIn  0.25s ease-out both; }
    .dot-1    { animation: dotPulse 1.2s ease-in-out 0.0s infinite; }
    .dot-2    { animation: dotPulse 1.2s ease-in-out 0.2s infinite; }
    .dot-3    { animation: dotPulse 1.2s ease-in-out 0.4s infinite; }
    .urgent-pulse { animation: urgentPulse 2s ease-in-out infinite; }

    /* Task card — elegant exit when being ticked/unticked */
    .task-card-shell {
      transition:
        opacity .45s cubic-bezier(0.4, 0, 0.2, 1),
        transform .45s cubic-bezier(0.4, 0, 0.2, 1),
        filter .45s cubic-bezier(0.4, 0, 0.2, 1),
        margin .45s cubic-bezier(0.4, 0, 0.2, 1),
        max-height .45s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity, transform, filter;
    }
    .task-card-shell.task-exit-right {
      opacity: 0;
      transform: translateX(36px) scale(0.95) rotate(0.8deg);
      filter: blur(5px);
      pointer-events: none;
    }
    .task-card-shell.task-exit-left {
      opacity: 0;
      transform: translateX(-36px) scale(0.95) rotate(-0.8deg);
      filter: blur(5px);
      pointer-events: none;
    }
    .task-card-shell.task-enter-from-todo {
      animation: taskEnterFromDone 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .task-card-shell.task-enter-from-done {
      animation: taskEnterFromTodo 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* Tick-box "just-checked" burst */
    @keyframes tickBurst {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.22); }
      100% { transform: scale(1); }
    }
    .tick-box.bursting { animation: tickBurst .35s cubic-bezier(0.34, 1.56, 0.64, 1); }

    /* Kanban columns */
    .kanban-col {
      display: flex; flex-direction: column;
      background: #f4f4f5;
      border: 1px solid #e4e4e7;
      border-radius: 14px;
      min-width: 0;
      overflow: hidden;
    }
    .kanban-col.is-done { background: #fafafa; }
    .kanban-col-head {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 18px 12px;
      border-bottom: 1px solid #b6c4dc;
      background: linear-gradient(90deg,#dbe4f1 0%,#cdd9ec 100%);
    }
    .kanban-col-head.is-done-head {
      background: linear-gradient(90deg,#cfd9ea 0%,#c0cfe6 100%);
      border-bottom-color: #a5b5d1;
    }
    .kanban-col-body {
      padding: 14px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .kanban-col-empty {
      padding: 24px 18px;
      color: #a1a1aa;
      text-align: center;
      font-size: 13px;
      font-style: italic;
    }

    button, input, textarea, select { font-family: inherit; }
    textarea { resize: none; }

    /* Custom checkbox */
    .tick-box {
      width: 20px; height: 20px; border-radius: 6px;
      border: 1.5px solid #d4d4d8; background: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s ease; flex-shrink: 0;
    }
    .tick-box:hover { border-color: #71717a; background: #fafafa; }
    .tick-box.done {
      background: #0a0a0a; border-color: #0a0a0a;
    }
    .tick-box.done::after {
      content: ""; width: 10px; height: 6px;
      border-left: 2px solid white; border-bottom: 2px solid white;
      transform: rotate(-45deg) translateY(-1px);
    }

    /* Interactive card hover — only when collapsed */
    .hover-card {
      transition: transform .25s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow .25s cubic-bezier(0.4, 0, 0.2, 1),
                  border-color .25s cubic-bezier(0.4, 0, 0.2, 1),
                  background .25s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }
    .hover-card:hover:not(.is-expanded):not(.is-done) {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(10, 10, 10, 0.09),
                  0 3px 8px rgba(10, 10, 10, 0.05) !important;
      border-top-color: #d4d4d8 !important;
      border-right-color: #d4d4d8 !important;
      border-bottom-color: #d4d4d8 !important;
      background: #fdfdfd;
    }
    .hover-card:hover:not(.is-expanded):not(.is-done) .card-chevron {
      opacity: 1;
      transform: translateX(2px);
    }
    .card-chevron {
      transition: opacity .25s ease, transform .25s ease;
      opacity: 0.5;
    }

    /* Explore-card hover */
    .explore-card {
      transition: all .2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .explore-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.07) !important;
      border-color: #a1a1aa !important;
    }

    /* Header treatment */
    .page-title-wrap {
      position: relative;
      padding-bottom: 22px;
      margin-bottom: 28px;
    }
    .page-title-wrap::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0;
      width: 52px;
      height: 3px;
      background: linear-gradient(90deg, #FFCC00 0%, #f59e0b 100%);
      border-radius: 2px;
    }
    .eyebrow {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #003399;
      margin-bottom: 14px;
      padding: 4px 11px;
      background: rgba(0, 51, 153, 0.06);

      font-weight: 800;
      letter-spacing: -1.4px;
      line-height: 1.05;
      color: #0a0a0a;
      margin-bottom: 10px;
    }

      font-size: 15.5px;
      color: #52525b;
      line-height: 1.55;
      max-width: 620px;
    }
  </style>

/* A compact, bold country-to-country route indicator — shown once, no duplication */
function RouteBadge({ size = "md", style = "names" }) {
  const cfg = size === "lg"
    ? { flag: 24, name: 16, arrow: 22, gap: 9 }
    : size === "sm"
      ? { flag: 15, name: 12, arrow: 14, gap: 6 }
      : { flag: 19, name: 14, arrow: 18, gap: 8 };
  const Arrow = () => (
    <svg width={cfg.arrow + 6} height={cfg.arrow} viewBox="0 0 28 14" aria-hidden="true" style={{ flexShrink:0 }}>
      <path d="M2 7 L23 7 M16.5 1.5 L23 7 L16.5 12.5"
            stroke="currentColor" strokeWidth="2.6" fill="none"
            strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
  // "names" = 🇳🇱 Netherlands → 🇩🇪 Germany  (default, bold, used everywhere)
  // "codes" = 🇳🇱 → 🇩🇪 (just flag + arrow, no text) — compact inline use
  if (style === "codes") {
    return (
      <span style={{ display:"inline-flex", alignItems:"center", gap: cfg.gap, color:"currentColor" }}>
        <span style={{ fontSize: cfg.flag, lineHeight: 1 }}>🇳🇱</span>
        <Arrow />
        <span style={{ fontSize: cfg.flag, lineHeight: 1 }}>🇩🇪</span>
      </span>
    );
  }
  return (
    <span style={{ display:"inline-flex", alignItems:"center", gap: cfg.gap, color:"currentColor", flexWrap:"wrap" }}>
      <span style={{ display:"inline-flex", alignItems:"center", gap: Math.max(6, cfg.gap - 2) }}>
        <span style={{ fontSize: cfg.flag, lineHeight: 1 }}>🇳🇱</span>
        <span style={{ fontSize: cfg.name, fontWeight: 700, letterSpacing:"-0.005em" }}>Netherlands</span>
      </span>
      <Arrow />
      <span style={{ display:"inline-flex", alignItems:"center", gap: Math.max(6, cfg.gap - 2) }}>
        <span style={{ fontSize: cfg.flag, lineHeight: 1 }}>🇩🇪</span>
        <span style={{ fontSize: cfg.name, fontWeight: 700, letterSpacing:"-0.005em" }}>Germany</span>
      </span>
    </span>
  );
}

function UrgentBadge({ compact=false }) {

function PageHeader({ eyebrow, title, subtitle }) {
  return (
    <div className="page-title-wrap fade-up">
      {eyebrow && <div className="eyebrow">{eyebrow}</div>}
      <h1 className="page-title display-font">{title}</h1>
      {subtitle && <p className="page-subtitle">{subtitle}</p>}
    </div>

function formatText(text) {
  return text.split('\n').map((line, i, arr) => {
    const parts = line.split(/\*\*(.*?)\*\*/g);
    return (
      <span key={i}>
        {parts.map((p, j) => j%2===1 ? <strong key={j}>{p}</strong> : p)}
        {i < arr.length-1 && <br/>}
      </span>
    );
  });
}

function TaskCard({ task, isDone, onToggleDone, notes, onAddNote, expanded, onExpand, exitDirection, enterDirection }) {
  const [noteDraft, setNoteDraft] = useState("");
  const [bursting, setBursting] = useState(false);

  const submitNote = () => {
    if (!noteDraft.trim()) return;
    onAddNote(noteDraft.trim());
    setNoteDraft("");
  };

  const handleTick = (e) => {
    e.stopPropagation();
    setBursting(true);
    setTimeout(()=>setBursting(false), 350);
    onToggleDone();
  };

  const cert = CERTAINTY_CFG[task.certainty] || CERTAINTY_CFG.medium;

  const shellClasses = [
    "hover-card",
    "task-card-shell",
    expanded ? "is-expanded" : "",
    isDone ? "is-done" : "",
    exitDirection === "right" ? "task-exit-right" : "",
    exitDirection === "left" ? "task-exit-left" : "",
    enterDirection === "fromTodo" ? "task-enter-from-todo" : "",
    enterDirection === "fromDone" ? "task-enter-from-done" : "",
  ].filter(Boolean).join(" ");

  return (
    <div
      className={shellClasses}
      style={{
        background: "white",
        borderRadius: 12,
        border: `1px solid ${task.urgent && !isDone ? "#fecaca" : "#e5e7eb"}`,
        borderLeft: `3px solid ${cert.accent}`,
        padding: "16px 18px",
        boxShadow: expanded ? "0 4px 16px rgba(0,0,0,0.06)" : "0 1px 2px rgba(0,0,0,0.02)",
        opacity: isDone ? 0.66 : 1,
        position: "relative",
      }}
    >
      {task.urgent && !isDone && (
        <div style={{ position:"absolute", top:-8, right:14 }}>
          <UrgentBadge />
        </div>
      )}

      <div style={{ display:"flex", alignItems:"flex-start", gap:12 }}>
        <div
          className={`tick-box ${isDone ? "done" : ""} ${bursting ? "bursting" : ""}`}
          onClick={handleTick}
          style={{ marginTop:2 }}
          title={isDone ? "Mark as not done" : "Mark as done"}
        />

        <div style={{ flex:1, minWidth:0, cursor:"pointer" }} onClick={onExpand}>
          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:4 }}>
            <span style={{
              fontWeight:600, fontSize:14,
              color: isDone ? "#9ca3af" : "#0a0a0a",
              textDecoration: isDone ? "line-through" : "none",
            }}>{task.name}</span>
            <span style={{
              background:`${task.catColor}12`, color:task.catColor,
              padding:"2px 8px", borderRadius:6, fontSize:10, fontWeight:600,
              letterSpacing:"0.02em",
            }}>{task.category}</span>
          </div>

          <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
            <span style={{ fontSize:11.5, color:"#71717a" }}>🇳🇱 {task.homeSystem}</span>
            <span style={{ fontSize:11, color:"#d4d4d8" }}>→</span>
            <span style={{ fontSize:11.5, color:"#71717a" }}>🇩🇪 {task.destSystem}</span>
          </div>

          {task.deadline && (
            <div style={{ marginTop:6, display:"flex", alignItems:"center", gap:5 }}>
              <span style={{ fontSize:11, color: task.urgent ? "#dc2626" : "#71717a" }}>
                ⏱ {task.deadline}
              </span>
            </div>
          )}
        </div>

        <button onClick={onExpand} className="card-chevron"
          style={{
            background:"transparent", border:"none", color:"#a1a1aa",
            cursor:"pointer", fontSize:12, padding:"4px 6px",
            transform: expanded ? "rotate(180deg)" : "rotate(0deg)",
            transition: "transform .2s ease, opacity .25s ease",
          }}
        >▼</button>
      </div>

      {expanded && (
        <div style={{ marginTop:14, paddingTop:14, borderTop:"1px solid #f4f4f5" }} className="fade-in">
          <div style={{ marginBottom:14 }}>
            <div style={{
              fontSize:10, fontWeight:700, color:"#71717a",
              letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6,
            }}>Why this matters</div>
            <p style={{ color:"#3f3f46", fontSize:13, lineHeight:1.65 }}>{task.why}</p>
          </div>

          <div style={{
            background:"#fafafa", borderRadius:10, padding:"12px 14px",
            border:"1px solid #f4f4f5", marginBottom:14,
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
              <span style={{ fontSize:12 }}>✨</span>

                Personalised AI insight
              </span>
            </div>
            <p style={{ color:"#3f3f46", fontSize:12.5, lineHeight:1.65 }}>{task.aiInsight}</p>
          </div>

          {task.conditions && (
            <div style={{
              background:"#fffbeb", borderRadius:10, padding:"10px 12px",
              border:"1px solid #fde68a", marginBottom:14,
            }}>
              <div style={{ fontSize:10.5, fontWeight:700, color:"#92400e", marginBottom:3, letterSpacing:"0.04em", textTransform:"uppercase" }}>
                Conditional
              </div>
              <p style={{ fontSize:12, color:"#78350f", lineHeight:1.6 }}>{task.conditions}</p>
            </div>
          )}

          {task.sources && (
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:10, fontWeight:700, color:"#71717a", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6 }}>Sources</div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {task.sources.map((s,i)=>(
                  <span key={i} style={{
                    fontSize:11, color:"#52525b", background:"#f4f4f5",

                ))}
              </div>
            </div>

              <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:10 }}>
                {notes.map((n,i)=>(
                  <div key={i} style={{
                    background:"#f8fafc", borderLeft:"2px solid #3b82f6",
                    padding:"8px 12px", borderRadius:6, fontSize:12.5,
                    color:"#334155", lineHeight:1.55,
                  }}>{n}</div>
                ))}
              </div>
            )}

            <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
              <textarea value={noteDraft} onChange={e=>setNoteDraft(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); submitNote(); } }}
                rows={1} placeholder="Add a note or ask a follow-up question…"
                style={{

              />

                  background: noteDraft.trim() ? "#0a0a0a" : "#e4e4e7",
                  color: noteDraft.trim() ? "white" : "#a1a1aa",
                  border:"none", borderRadius:8, padding:"8px 14px",
                  fontSize:12, fontWeight:600, whiteSpace:"nowrap",
                  cursor: noteDraft.trim() ? "pointer" : "default",
                  transition:"all .15s",
                }}
              >Add</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TasksTab({ completed, toggleDone, notes, addNote }) {
  const [expanded, setExpanded] = useState(null);
  const [exitingId, setExitingId] = useState(null);   // id animating out of source column
  const [enteringId, setEnteringId] = useState(null); // id just arrived in destination column

  // When user ticks/unticks: first animate exit, then commit state change, then animate enter
  const handleTick = useCallback((id) => {
    // Prevent double-taps mid-animation
    if (exitingId || enteringId) return;
    setExitingId(id);
    // Exit animation duration = 450ms
    window.setTimeout(() => {
      toggleDone(id);
      setExitingId(null);
      setEnteringId(id);
      // Auto-collapse if leaving the column while expanded
      setExpanded(prev => prev === id ? null : prev);
      window.setTimeout(() => setEnteringId(curr => curr === id ? null : curr), 500);
    }, 450);
  }, [exitingId, enteringId, toggleDone]);

  // Sort helper: group strictly by certainty tier, then urgent within tier
  const sortFn = (a, b) => {
    const rank = { high:0, medium:1, low:2 };
    const d = (rank[a.certainty]||3) - (rank[b.certainty]||3);
    if (d !== 0) return d;
    const aU = a.urgent ? 0 : 1;
    const bU = b.urgent ? 0 : 1;
    return aU - bU;
  };

  const todoTasks = useMemo(
    () => TASKS.filter(t => !completed.has(t.id)).sort(sortFn),
    [completed]
  );
  const doneTasks = useMemo(
    () => TASKS.filter(t => completed.has(t.id)).sort(sortFn),
    [completed]
  );

  const urgentPendingCount = todoTasks.filter(t => t.urgent).length;

  return (
    <div className="fade-up" style={{
      display:"flex", flexDirection:"column",
      padding:"36px 40px 60px",
    }}>
      <PageHeader
        title="Your tasks"
        subtitle={`What you need to sort out for your move to ${INIT_USER.destCountry}`}
      />

      {/* Kanban board */}
      <div style={{
        display:"grid",
        gridTemplateColumns:"1fr 1fr",
        gap:20,
      }}>
        {/* ───── To-do column ───── */}
        <div className="kanban-col">
          <div className="kanban-col-head">
            <span style={{
              width:9, height:9, borderRadius:"50%",
              background:"#0a0a0a",
            }}/>
            <h2 className="display-font" style={{ fontSize:17, fontWeight:700, letterSpacing:"-0.3px", color:"#0a0a0a" }}>
              To-do
            </h2>
            <span style={{
              background:"#0a0a0a", color:"white",
              fontSize:11, fontWeight:700, letterSpacing:"0.02em",
              padding:"2px 8px", borderRadius:999,
            }}>{todoTasks.length}</span>
            {urgentPendingCount > 0 && (
              <span style={{
                background:"#dc2626", color:"white",
                fontSize:10.5, fontWeight:700, letterSpacing:"0.04em",
                padding:"2px 8px", borderRadius:999,
                marginLeft:2,
              }} className="urgent-pulse">
                {urgentPendingCount} urgent
              </span>
            )}
            <span style={{ flex:1 }} />
            <span style={{ fontSize:11, color:"#71717a" }}>Tap ☐ to complete</span>
          </div>
          <div className="kanban-col-body">
            {todoTasks.length === 0 && (
              <div className="kanban-col-empty">
                🎉 Nothing pending. Everything's done.
              </div>
            )}
            {(() => {
              const TIER_META = {
                high:   { label:"Almost certain to-do's",        accent:"#10b981", soft:"#ecfdf5", text:"#047857" },
                medium: { label:"Likely to-do's",                accent:"#f59e0b", soft:"#fffbeb", text:"#b45309" },
                low:    { label:"Uncertain to-do's. Double-check", accent:"#94a3b8", soft:"#f1f5f9", text:"#475569" },
              };
              return ["high","medium","low"].map(tier => {
                const items = todoTasks.filter(t => t.certainty === tier);
                if (items.length === 0) return null;
                const meta = TIER_META[tier];
                return (
                  <React.Fragment key={tier}>
                    <div style={{
                      display:"flex", alignItems:"center", gap:8,
                      padding:"6px 10px",
                      background: meta.soft,
                      border:`1px solid ${meta.accent}33`,
                      borderLeft:`3px solid ${meta.accent}`,
                      borderRadius:7,
                      marginTop: tier === "high" ? 0 : 6,
                    }}>
                      <span style={{
                        fontSize:11, fontWeight:700, letterSpacing:"0.04em",
                        textTransform:"uppercase", color: meta.text,
                      }}>{meta.label}</span>
                      <span style={{
                        background: meta.accent, color:"white",
                        fontSize:10, fontWeight:700, letterSpacing:"0.02em",
                        padding:"1px 7px", borderRadius:999,
                      }}>{items.length}</span>
                    </div>
                    {items.map(t => (
                      <TaskCard
                        key={t.id}
                        task={t}
                        isDone={false}
                        onToggleDone={()=>handleTick(t.id)}
                        notes={notes[t.id] || []}
                        onAddNote={(n)=>addNote(t.id, n)}
                        expanded={expanded === t.id}
                        onExpand={()=>setExpanded(expanded === t.id ? null : t.id)}
                        exitDirection={exitingId === t.id ? "right" : null}
                        enterDirection={enteringId === t.id ? "fromDone" : null}
                      />
                    ))}
                  </React.Fragment>
                );
              });
            })()}
          </div>
        </div>

        {/* ───── Done column ───── */}
        <div className="kanban-col is-done">
          <div className="kanban-col-head is-done-head">
            <span style={{
              width:9, height:9, borderRadius:"50%",
              background:"#10b981", boxShadow:"0 0 0 3px rgba(16,185,129,0.18)",
            }}/>
            <h2 className="display-font" style={{ fontSize:17, fontWeight:700, letterSpacing:"-0.3px", color:"#0a0a0a" }}>
              Done
            </h2>
            <span style={{
              background:"#10b981", color:"white",
              fontSize:11, fontWeight:700, letterSpacing:"0.02em",
              padding:"2px 8px", borderRadius:999,
            }}>{doneTasks.length}</span>
            <span style={{ flex:1 }} />
            <span style={{ fontSize:11, color:"#71717a" }}>Tap ☑ to un-do</span>
          </div>
          <div className="kanban-col-body">
            {doneTasks.length === 0 && (
              <div className="kanban-col-empty">
                Nothing ticked yet — your completed tasks will arrive here.
              </div>
            )}
            {doneTasks.map(t => (
              <TaskCard
                key={t.id}
                task={t}
                isDone={true}
                onToggleDone={()=>handleTick(t.id)}
                notes={notes[t.id] || []}
                onAddNote={(n)=>addNote(t.id, n)}
                expanded={expanded === t.id}
                onExpand={()=>setExpanded(expanded === t.id ? null : t.id)}
                exitDirection={exitingId === t.id ? "left" : null}
                enterDirection={enteringId === t.id ? "fromTodo" : null}
              />
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─────────────────────────── INSIGHTS ─────────────────────────── */

function InsightsTab({ completed, toggleDone, notes, addNote }) {
  const [expanded, setExpanded] = useState(null);

  const byCategory = useMemo(()=>{
    const map = {};
    for (const i of INSIGHTS) {
      map[i.category] = map[i.category] || [];
      map[i.category].push(i);
    }
    const prioRank = { high:0, medium:1, low:2 };
    for (const k of Object.keys(map)) {
      map[k].sort((a,b) => {
        const aDone = completed.has(a.id) ? 1 : 0;
        const bDone = completed.has(b.id) ? 1 : 0;
        if (aDone !== bDone) return aDone - bDone;
        const aU = a.urgent ? 0 : 1;
        const bU = b.urgent ? 0 : 1;
        if (aU !== bU) return aU - bU;
        return (prioRank[a.priority]||3) - (prioRank[b.priority]||3);
      });
    }
    return map;
  },[completed]);

  const categories = ["Healthcare","Finance","Family","Professional","Housing","Integration","Cultural"];

  return (
    <div style={{ padding:"36px 40px 60px", maxWidth:1080, margin:"0 auto", width:"100%" }} className="fade-up">
      <PageHeader
        eyebrow="Tailored to your profile"
        title="Opportunities for you"
        subtitle={<span style={{ display:"inline-flex", alignItems:"center", flexWrap:"wrap", gap:10 }}>
          <span>Unique benefits, subsidies, and allowances we've matched to your exact circumstances: self-employed · 1 dependent · Type 1 Diabetes ·</span>
          <span style={{ color:"#0f172a", display:"inline-flex", alignItems:"center" }}>
            <RouteBadge size="sm" />
          </span>
        </span>}
      />

      {categories.map(cat=>{
        const items = byCategory[cat];
        if (!items || items.length === 0) return null;

        return (
          <section key={cat} style={{ marginBottom:32 }}>
            <div style={{
              display:"flex", alignItems:"center", gap:8, marginBottom:12,
              paddingBottom:8, borderBottom:"1px solid #e4e4e7"
            }}>
              <h2 className="display-font" style={{ fontSize:17, fontWeight:700, letterSpacing:"-0.3px" }}>{cat}</h2>
              <span style={{ fontSize:11.5, color:"#a1a1aa" }}>· {items.length}</span>
            </div>

            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              {items.map(rec => (
                <InsightCard
                  key={rec.id}
                  rec={rec}
                  isDone={completed.has(rec.id)}
                  onToggleDone={()=>toggleDone(rec.id)}
                  notes={notes[rec.id] || []}
                  onAddNote={(n)=>addNote(rec.id, n)}
                  expanded={expanded === rec.id}
                  onExpand={()=>setExpanded(expanded === rec.id ? null : rec.id)}
                />
              ))}
            </div>
          </section>
        );
      })}
    </div>
  );
}

/* ─────────────────────────── ASSISTANT ─────────────────────────── */

function AssistantTab() {
  const [msgs, setMsgs] = useState(INIT_MSGS);
  const [input, setInput] = useState("");
  const [typing, setTyping] = useState(false);
  const bottomRef = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({ behavior:"smooth" }); },[msgs,typing]);

  const send = useCallback((text)=>{
    const q = (text||input).trim();
    if(!q) return;
    setMsgs(m=>[...m,{ role:"user", text:q }]);
    setInput("");
    setTyping(true);
    const delay = 900 + Math.random()*600;
    setTimeout(()=>{
      const r = AI[q] || "That's a nuanced question. Based on your profile (self-employed, Type 1 Diabetes, moving from the Netherlands to Germany), I'd recommend verifying the specific requirements with your local Finanzamt or a cross-border tax advisor (Steuerberater mit grenzüberschreitender Erfahrung). Would you like me to explain any particular aspect in more detail?";
      setTyping(false);
      setMsgs(m=>[...m,{ role:"assistant", text:r }]);
    }, delay);
  },[input]);

  return (
    <div style={{ display:"flex", flexDirection:"column" }} className="fade-in">

      {/* Header row: title + subtitle on the left, quick questions on the right */}
      <div style={{
        padding:"32px 40px 40px", borderBottom:"1px solid #f1f5f9",
        background:"white", flexShrink:0,
        display:"flex", gap:28, alignItems:"flex-start", flexWrap:"wrap",
      }}>
        <div style={{ flex:"1 1 360px", minWidth:280 }}>
          <div className="page-title-wrap" style={{ paddingBottom:14, marginBottom:0 }}>
            <div className="eyebrow">AI-driven</div>
            <h1 className="page-title display-font" style={{ fontSize:30, marginBottom:8 }}>Assistant</h1>
            <p className="page-subtitle" style={{ fontSize:15, lineHeight:1.5, maxWidth:440 }}>
              Anything unclear about your move?<br/>Ask me anything.
            </p>
          </div>
        </div>

        <div style={{
          flex:"0 1 420px", display:"flex", flexWrap:"wrap", gap:7,
          justifyContent:"flex-end", alignContent:"flex-start",
          paddingTop:4,
        }}>
          <span style={{ width:"100%", color:"#a1a1aa", fontSize:11, fontWeight:600, letterSpacing:"0.04em", textTransform:"uppercase", textAlign:"right", marginBottom:4 }}>
            Try asking
          </span>
          {QUICK_QS.map(q=>(
            <button key={q} onClick={()=>send(q)}
              style={{
                background:"white", border:"1px solid #e4e4e7", borderRadius:20,
                padding:"5px 12px", fontSize:11.5, color:"#0a0a0a", fontWeight:500,
                cursor:"pointer", transition:"all .15s", textAlign:"left",
              }}
              onMouseEnter={e=>{ e.target.style.borderColor="#a1a1aa"; e.target.style.background="#fafafa"; }}
              onMouseLeave={e=>{ e.target.style.borderColor="#e4e4e7"; e.target.style.background="white"; }}
            >{q}</button>
          ))}
        </div>
      </div>

      {/* Chat area — grows with content, no forced stretch */}
      <div style={{ padding:"40px 48px 10px", display:"flex", flexDirection:"column", gap:14 }}>
        {msgs.map((m,i)=>(
          <div key={i} style={{
            display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start",
            gap:10, alignItems:"flex-end"
          }}>
            {m.role==="assistant" && (
              <div style={{
                width:30, height:30, borderRadius:9,
                background:"linear-gradient(135deg,#003399,#1a56db)",
                display:"flex", alignItems:"center", justifyContent:"center",
                fontSize:13, flexShrink:0, color:"white"
              }}>✦</div>
            )}

            <div style={{
              maxWidth:"72%",
              background: m.role==="user" ? "#0a0a0a" : "white",
              color: m.role==="user" ? "white" : "#3f3f46",
              padding:"11px 15px", borderRadius:13,
              borderBottomRightRadius: m.role==="user" ? 3 : 13,
              borderBottomLeftRadius:  m.role==="assistant" ? 3 : 13,
              fontSize:13.5, lineHeight:1.65,
              boxShadow:"0 1px 4px rgba(0,0,0,0.06)",
              border: m.role==="assistant" ? "1px solid #f1f5f9" : "none",
            }}>
              {formatText(m.text)}
            </div>
          </div>
        ))}

        {typing && (
          <div style={{ display:"flex", gap:10, alignItems:"flex-end" }}>
            <div style={{
              width:30, height:30, borderRadius:9,
              background:"linear-gradient(135deg,#003399,#1a56db)",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:13, color:"white"
            }}>✦</div>
            <div style={{
              background:"white", padding:"12px 16px", borderRadius:13,
              borderBottomLeftRadius:3, border:"1px solid #f1f5f9",
              boxShadow:"0 1px 4px rgba(0,0,0,0.06)",
              display:"flex", gap:4, alignItems:"center"
            }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background:"#94a3b8" }} className="dot-1" />
              <div style={{ width:6, height:6, borderRadius:"50%", background:"#94a3b8" }} className="dot-2" />
              <div style={{ width:6, height:6, borderRadius:"50%", background:"#94a3b8" }} className="dot-3" />
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      <div style={{ padding:"10px 48px 18px", background:"white", flexShrink:0 }}>
        <div style={{
          display:"flex", gap:9, background:"#fafafa", borderRadius:12,

          <input value={input} onChange={e=>setInput(e.target.value)}

            style={{

              color:"#0a0a0a", outline:"none"
            }} />
          <button onClick={()=>send()} disabled={!input.trim()}
            style={{
              background: input.trim() ? "#0a0a0a" : "#e4e4e7",
              color: input.trim() ? "white" : "#a1a1aa",
              border:"none", borderRadius:8, padding:"7px 16px",
              fontSize:12, fontWeight:600,
              cursor: input.trim() ? "pointer" : "default",
              transition:"all .15s"
            }}
          >Send →</button>
        </div>
        <p style={{ color:"#cbd5e1", fontSize:10, marginTop:8, textAlign:"center" }}>
          Responses are AI-generated based on publicly available legislation. Always verify with official government sources.
        </p>
      </div>
    </div>
  );
}

/* ─────────────────────────── APP ─────────────────────────── */

function App() {
  const [screen, setScreen] = useState("welcome");
  const [tab, setTab] = useState("overview");

  const [profile, setProfile] = useState(INIT_USER);
  const [docs, setDocs] = useState(DOCS_LIBRARY);
  const [completed, setCompleted] = useState(new Set());
  const [notes, setNotes] = useState({});

  const toggleDone = useCallback((id)=>{
    setCompleted(prev=>{
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  },[]);

  const addNote = useCallback((id, note)=>{
    setNotes(prev => ({ ...prev, [id]: [...(prev[id] || []), note] }));
  },[]);

  const toggleDoc = useCallback((id)=>{
    setDocs(prev => prev.map(d => d.id === id ? { ...d, uploaded: !d.uploaded } : d));
  },[]);

  const urgentTasks = useMemo(
    ()=>TASKS.filter(t=>t.urgent && !completed.has(t.id)),
    [completed]
  );

  const totalTaskCount = TASKS.length;
  const totalAllCount = TASKS.length + INSIGHTS.length;
  const doneCount = useMemo(()=>{
    let c = 0;
    for (const t of TASKS) if (completed.has(t.id)) c++;
    return c;
  },[completed]);

  const progressPct = Math.round((completed.size / totalAllCount) * 100);

  // Days until next task — in this demo always 19 (GKV enrolment before departure)
  const nextDueDays = useMemo(()=>{
    const nextUrgent = urgentTasks[0];
    if (!nextUrgent) return profile.daysLeft;
    // Extract leading number from deadline text if present
    const m = nextUrgent.deadline.match(/(\d+)/);
    return m ? Number(m[1]) : profile.daysLeft;
  },[urgentTasks, profile.daysLeft]);

  if(screen==="welcome") return <WelcomeScreen onStart={()=>setScreen("dashboard")} />;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#fafafa" }}>
      <TopNav
        activeTab={tab}
        onTab={setTab}
        urgentCount={urgentTasks.length}
        progressPct={progressPct}
        userName={profile.name}
        nextDueDays={nextDueDays}
      />
      <div style={{ flex:1, minHeight:0, display:"flex", flexDirection:"column", overflowY:"auto" }}>
        {tab==="overview" && (
          <OverviewTab
            onNav={setTab}
            urgentTasks={urgentTasks}
            doneCount={doneCount}
            totalTasks={totalTaskCount}
            userName={profile.name}
            progressPct={progressPct}
            completedTotal={completed.size}
            totalAllCount={totalAllCount}
          />
        )}
        {tab==="tasks" && (
          <TasksTab completed={completed} toggleDone={toggleDone} notes={notes} addNote={addNote} />
        )}
        {tab==="insights" && (
          <InsightsTab completed={completed} toggleDone={toggleDone} notes={notes} addNote={addNote} />
        )}
        {tab==="assistant" && <AssistantTab />}
        {tab==="profile" && (
          <ProfileTab profile={profile} setProfile={setProfile} docs={docs} toggleDoc={toggleDoc} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
